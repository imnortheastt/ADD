# Always-green gate: the tooling test suite runs on every push to main and every PR,
# across the Python floor (3.10) and a current release (3.12). The publish workflow
# re-runs this same suite at tag time, so a tag can never ship a red tree.
#
# seam-audit is the enforcement seam DISTINCT from the agent (task audit-ci, v14):
# it re-verifies every recorded human gate on the dogfood board with
# `add.py audit` — a malformed seam record fails CI on a machine the agent does
# not control (never-self-gate, foundation v2). BLOCKING by design.

name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Tooling tests (py ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.12']
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      # The npm installer twin now carries a runtime dep (@clack/prompts) on the
      # interactive path. The tooling suite spawns `node cli.js` with the
      # force-interactive seam, so @clack/prompts must be importable for the
      # clack-cancel branch (test_installer_prompts: the "1" seam) to be exercised
      # — without it the run degrades to the plain-text fallback (exit 0 != 130).
      - uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install npm deps (clack interactive path)
        working-directory: add-method
        run: npm ci

      - name: Run tooling test suite
        working-directory: add-method
        run: python3 -m unittest discover -s tooling -p 'test_*.py'

  seam-audit:
    name: Seam audit (recorded human gates)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Audit the dogfood board (.add)
        run: python3 .add/tooling/add.py audit
